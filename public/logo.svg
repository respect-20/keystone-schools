<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 320" fill="none">
  <!-- Outer red shield -->
  <path d="M150 308 C150 308 18 252 18 148 L18 50 L150 22 L282 50 L282 148 C282 252 150 308 150 308Z"
    fill="white" stroke="#CC0000" stroke-width="10"/>
  <!-- Inner black shield -->
  <path d="M150 280 C150 280 46 232 46 148 L46 72 L150 50 L254 72 L254 148 C254 232 150 280 150 280Z"
    fill="white" stroke="#1a1a1a" stroke-width="5"/>

  <!-- Red keystone trapezoid on top -->
  <path d="M110 10 L190 10 L208 52 L92 52 Z" fill="#CC0000"/>
  <!-- Keystone hole (white) -->
  <path d="M128 14 L172 14 L184 46 L116 46 Z" fill="white"/>

  <!-- Open book - left cover -->
  <path d="M72 132 Q72 100 100 95 L146 90 L146 200 Q118 196 72 202 Z" fill="#1a1a1a"/>
  <!-- Open book - right cover -->
  <path d="M228 132 Q228 100 200 95 L154 90 L154 200 Q182 196 228 202 Z" fill="#1a1a1a"/>
  <!-- Book spine highlight -->
  <rect x="144" y="88" width="12" height="114" rx="2" fill="#CC0000"/>

  <!-- Left page lines -->
  <line x1="90" y1="115" x2="140" y2="111" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="88" y1="130" x2="140" y2="126" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="87" y1="145" x2="140" y2="141" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="86" y1="160" x2="140" y2="156" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="86" y1="175" x2="140" y2="171" stroke="white" stroke-width="3" stroke-linecap="round"/>

  <!-- Right page lines -->
  <line x1="210" y1="115" x2="160" y2="111" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="212" y1="130" x2="160" y2="126" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="213" y1="145" x2="160" y2="141" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="214" y1="160" x2="160" y2="156" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="214" y1="175" x2="160" y2="171" stroke="white" stroke-width="3" stroke-linecap="round"/>

  <!-- Book top arc left page -->
  <path d="M100 95 Q120 78 146 90" fill="none" stroke="#1a1a1a" stroke-width="4"/>
  <!-- Book top arc right page -->
  <path d="M200 95 Q180 78 154 90" fill="none" stroke="#1a1a1a" stroke-width="4"/>
</svg>
